<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动报名 - 浙江大学企业家培训</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #0055A2;
            --secondary-color: #E6A100;
            --text-dark: #333333;
            --text-light: #666666;
            --bg-light: #F5F5F5;
            --white: #FFFFFF;
            --success-color: #52c41a;
            --error-color: #ff4d4f;
            --border-color: #E1E6ED;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--white);
            min-height: 100vh;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .form-container {
            padding: 0 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }
        
        .form-group input[type="text"],
        .form-group input[type="tel"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input[type="text"]:focus,
        .form-group input[type="tel"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 85, 162, 0.1);
        }
        
        .gender-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .gender-option {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .gender-option input[type="radio"] {
            width: auto;
        }
        
        .error-message {
            color: var(--error-color);
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .form-group.has-error input {
            border-color: var(--error-color);
        }
        
        .form-group.has-error .error-message {
            display: block;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 30px;
        }
        
        .submit-btn:hover {
            background-color: #004488;
        }
        
        .submit-btn:disabled {
            background-color: #CCCCCC;
            cursor: not-allowed;
        }
        
        .feedback {
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        
        .feedback.success {
            background-color: rgba(82, 196, 26, 0.1);
            color: var(--success-color);
            display: block;
        }
        
        .feedback.error {
            background-color: rgba(255, 77, 79, 0.1);
            color: var(--error-color);
            display: block;
        }
        
        .footer {
            text-align: center;
            padding: 30px 0 20px;
            color: var(--text-light);
            font-size: 12px;
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .header {
                padding: 20px 0;
                margin-bottom: 20px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .form-container {
                padding: 0;
            }
            
            .form-group {
                margin-bottom: 15px;
            }
            
            .form-group input[type="text"],
            .form-group input[type="tel"] {
                padding: 10px 12px;
                font-size: 13px;
            }
            
            .gender-options {
                gap: 15px;
            }
            
            .submit-btn {
                padding: 12px;
                font-size: 14px;
                margin-top: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 18px;
            }
            
            .gender-options {
                flex-direction: column;
                gap: 10px;
            }
            
            .gender-option {
                justify-content: flex-start;
            }
        }
        
        /* 加载动画 */
        .loading {
            position: relative;
            pointer-events: none;
        }
        
        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 15px;
            width: 16px;
            height: 16px;
            margin-top: -8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>活动报名</h1>
            <p>请填写以下信息完成报名</p>
        </div>
        
        <div class="form-container">
            <form id="registrationForm">
                <div class="form-group">
                    <label for="name">姓名 *</label>
                    <input type="text" id="name" name="name" placeholder="请输入您的姓名">
                    <div class="error-message" id="nameError">请输入姓名</div>
                </div>
                
                <div class="form-group">
                    <label>性别 *</label>
                    <div class="gender-options">
                        <div class="gender-option">
                            <input type="radio" id="genderMale" name="gender" value="男" checked>
                            <label for="genderMale">男</label>
                        </div>
                        <div class="gender-option">
                            <input type="radio" id="genderFemale" name="gender" value="女">
                            <label for="genderFemale">女</label>
                        </div>
                        <div class="gender-option">
                            <input type="radio" id="genderOther" name="gender" value="其他">
                            <label for="genderOther">其他</label>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="company">企业名称 *</label>
                    <input type="text" id="company" name="company" placeholder="请输入您的企业名称">
                    <div class="error-message" id="companyError">请输入企业名称</div>
                </div>
                
                <div class="form-group">
                    <label for="position">职位 *</label>
                    <input type="text" id="position" name="position" placeholder="请输入您的职位">
                    <div class="error-message" id="positionError">请输入职位</div>
                </div>
                
                <div class="form-group">
                    <label for="phone">手机号 *</label>
                    <input type="tel" id="phone" name="phone" placeholder="请输入您的手机号">
                    <div class="error-message" id="phoneError">请输入正确的手机号</div>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">立即提交</button>
            </form>
            
            <div class="feedback" id="feedback"></div>
        </div>
        
        <div class="footer">
            <p>© 2026 浙江大学企业家培训 | 保留所有权利</p>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('registrationForm');
            const submitBtn = document.getElementById('submitBtn');
            const feedback = document.getElementById('feedback');
            let isSubmitting = false;
            
            // 表单验证
            function validateForm() {
                let isValid = true;
                
                // 验证姓名
                const name = document.getElementById('name');
                const nameError = document.getElementById('nameError');
                if (!name.value.trim()) {
                    showError(name, nameError, '请输入姓名');
                    isValid = false;
                } else {
                    hideError(name, nameError);
                }
                
                // 验证企业名称
                const company = document.getElementById('company');
                const companyError = document.getElementById('companyError');
                if (!company.value.trim()) {
                    showError(company, companyError, '请输入企业名称');
                    isValid = false;
                } else {
                    hideError(company, companyError);
                }
                
                // 验证职位
                const position = document.getElementById('position');
                const positionError = document.getElementById('positionError');
                if (!position.value.trim()) {
                    showError(position, positionError, '请输入职位');
                    isValid = false;
                } else {
                    hideError(position, positionError);
                }
                
                // 验证手机号
                const phone = document.getElementById('phone');
                const phoneError = document.getElementById('phoneError');
                const phoneRegex = /^1[3-9]\d{9}$/;
                if (!phone.value.trim()) {
                    showError(phone, phoneError, '请输入手机号');
                    isValid = false;
                } else if (!phoneRegex.test(phone.value.trim())) {
                    showError(phone, phoneError, '请输入正确的手机号');
                    isValid = false;
                } else {
                    hideError(phone, phoneError);
                }
                
                return isValid;
            }
            
            function showError(input, errorElement, message) {
                input.parentElement.classList.add('has-error');
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }
            
            function hideError(input, errorElement) {
                input.parentElement.classList.remove('has-error');
                errorElement.style.display = 'none';
            }
            
            // 实时验证
            const inputs = form.querySelectorAll('input[type="text"], input[type="tel"]');
            inputs.forEach(input => {
                input.addEventListener('input', function() {
                    validateForm();
                });
            });
            
            // 表单提交
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                if (isSubmitting) {
                    return;
                }
                
                if (validateForm()) {
                    submitForm();
                }
            });
            
            function submitForm() {
                isSubmitting = true;
                submitBtn.disabled = true;
                submitBtn.classList.add('loading');
                submitBtn.textContent = '提交中...';
                feedback.textContent = '';
                feedback.className = 'feedback';
                
                // 获取表单数据
                const formData = {
                    name: document.getElementById('name').value.trim(),
                    gender: document.querySelector('input[name="gender"]:checked').value,
                    company: document.getElementById('company').value.trim(),
                    position: document.getElementById('position').value.trim(),
                    phone: document.getElementById('phone').value.trim()
                };
                
                // 模拟API调用延迟
                setTimeout(() => {
                    try {
                        // 构建飞书表单URL
                        const baseUrl = 'https://my.feishu.cn/share/base/form/shrcntb2PbwNBaCn3oQ6CIhlX1e';
                        
                        // 这里我们直接跳转到飞书多维表格
                        // 实际项目中，你可能需要先通过API将数据提交到服务器，然后再跳转
                        
                        // 显示成功消息
                        feedback.className = 'feedback success';
                        feedback.textContent = '报名成功！正在跳转到飞书表单...';
                        
                        // 延迟跳转到飞书表单
                        setTimeout(() => {
                            window.location.href = baseUrl;
                        }, 1500);
                    } catch (error) {
                        feedback.className = 'feedback error';
                        feedback.textContent = '提交失败，请稍后重试';
                        resetFormState();
                    }
                }, 1000);
            }
            
            function resetFormState() {
                isSubmitting = false;
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                submitBtn.textContent = '立即提交';
            }
        });
    </script>
</body>
</html>
